<html lang="en"><head>
<meta charset="UTF-8">

<title>Lutra Health — The infrastructure for modern eye care collaboration</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>/* ================================================================
   Lutra Health — Design Tokens (trimmed for website)
   ================================================================ */

:root {
  --lutra-navy:       #001f54;
  --lutra-navy-deep:  #00173f;
  --lutra-blue:       #2c48ed;
  --lutra-blue-hover: #2339c6;
  --lutra-teal:       #01c7a9;
  --lutra-lilac:      #eeedf4;
  --lutra-blue-400:   #7c95f7;
  --lutra-blue-200:   #c0d7ff;
  --lutra-blue-100:   #e6eefe;
  --lutra-ink-80:     #334b76;
  --lutra-ink-60:     #667898;
  --lutra-ink-40:     #99a5ba;
  --lutra-ink-20:     #ccd2dc;
  --lutra-ink-10:     #e6e9ee;
  --lutra-ink-05:     #f3f4f7;
  --lutra-bone:       #fafafb;

  --fg-1: #001f54;
  --fg-2: #334b76;
  --fg-3: #667898;
  --fg-4: #99a5ba;
  --fg-brand: #2c48ed;

  --bg-1: #ffffff;
  --bg-2: #fafafb;
  --bg-3: #eeedf4;
  --bg-4: #f3f4f7;

  --border-1: #e6e9ee;
  --border-2: #ccd2dc;

  --success-soft: #d4f5ee;

  --font-display: 'Manrope', ui-sans-serif, system-ui, sans-serif;
  --font-body:    'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-display-lg: 'Inter Display Lg', 'Manrope', sans-serif;

  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-2xl: 32px;
  --radius-pill: 999px;

  --shadow-xs: 0 1px 2px rgba(0, 31, 84, 0.06);
  --shadow-sm: 0 2px 4px rgba(0, 31, 84, 0.06), 0 1px 2px rgba(0, 31, 84, 0.04);
  --shadow-md: 0 8px 20px -8px rgba(0, 31, 84, 0.12), 0 2px 6px rgba(0, 31, 84, 0.06);
  --shadow-lg: 0 20px 40px -12px rgba(0, 31, 84, 0.18), 0 4px 10px rgba(0, 31, 84, 0.06);
  --shadow-xl: 0 32px 64px -16px rgba(0, 31, 84, 0.22);
  --shadow-brand: 0 12px 28px -8px rgba(44, 72, 237, 0.35);

  --ring: 0 0 0 3px rgba(44, 72, 237, 0.25);

  --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);
  --dur-fast: 120ms;
  --dur-base: 200ms;
  --dur-slow: 320ms;
}


* { box-sizing: border-box; }
html, body {
  margin: 0;
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.55;
  color: var(--fg-2);
  background: var(--bg-1);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body { min-height: 100vh; }
h1, h2, h3, h4, h5 {
  font-family: var(--font-display);
  color: var(--fg-1);
  margin: 0;
  line-height: 1.15;
  letter-spacing: -0.02em;
  text-wrap: balance;
}
p { margin: 0 0 1em; text-wrap: pretty; }
a { color: var(--fg-brand); text-decoration: none; transition: color var(--dur-fast) var(--ease-out); }
a:hover { color: var(--lutra-navy); }
img, svg { display: block; max-width: 100%; }

*:focus-visible { outline: none; box-shadow: var(--ring); border-radius: var(--radius-xs); }

/* ---------- Layout ---------- */
.container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }
.container-wide { max-width: 1360px; margin: 0 auto; padding: 0 32px; }
.section { padding: 112px 0; }
.section-sm { padding: 72px 0; }
@media (max-width: 720px) {
  .container, .container-wide { padding: 0 20px; }
  .section { padding: 72px 0; }
}

/* ---------- Eyebrow ---------- */
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--lutra-blue);
}
.eyebrow::before {
  content: "";
  width: 18px;
  height: 1.5px;
  background: currentColor;
  display: inline-block;
}
.eyebrow.no-line::before { display: none; }
.eyebrow-teal { color: var(--lutra-teal); }
.eyebrow-inverse { color: var(--lutra-teal); }

/* ---------- Buttons ---------- */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 15px;
  padding: 12px 20px;
  border-radius: 12px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all var(--dur-base) var(--ease-out);
  letter-spacing: -0.005em;
  text-decoration: none;
  white-space: nowrap;
}
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--lutra-blue); color: #fff; box-shadow: var(--shadow-brand); }
.btn-primary:hover { background: var(--lutra-blue-hover); color: #fff; }
.btn-secondary { background: var(--lutra-navy); color: #fff; }
.btn-secondary:hover { background: var(--lutra-navy-deep); color: #fff; }
.btn-ghost { background: transparent; color: var(--lutra-navy); border-color: var(--lutra-ink-20); }
.btn-ghost:hover { background: var(--lutra-ink-05); border-color: var(--lutra-ink-40); color: var(--lutra-navy); }
.btn-ghost-inverse { background: transparent; color: #fff; border-color: rgba(255,255,255,0.25); }
.btn-ghost-inverse:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.5); color: #fff; }
.btn-lg { padding: 15px 26px; font-size: 16px; border-radius: 14px; }
.btn-sm { padding: 8px 14px; font-size: 13px; border-radius: 10px; }

/* ---------- Badges / Pills ---------- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 11px;
  border-radius: 999px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: 0;
}
.badge-info { background: var(--lutra-blue-100); color: var(--lutra-blue-hover); }
.badge-ok { background: var(--success-soft); color: #00735e; }
.badge-dark { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.12); }
.badge-dot { width: 6px; height: 6px; border-radius: 999px; background: currentColor; }

/* ---------- Card ---------- */
.card {
  background: #fff;
  border: 1px solid var(--border-1);
  border-radius: 16px;
  padding: 28px;
  box-shadow: var(--shadow-sm);
  transition: box-shadow var(--dur-base) var(--ease-out);
}
.card:hover { box-shadow: var(--shadow-md); }
.card-dark { background: var(--lutra-navy); color: #fff; border: none; }
.card-lilac { background: var(--lutra-lilac); border: none; }

/* ---------- Header ---------- */
.site-header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,255,255,0.82);
  backdrop-filter: saturate(160%) blur(16px);
  -webkit-backdrop-filter: saturate(160%) blur(16px);
  border-bottom: 1px solid rgba(230,233,238,0.8);
}
.site-header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
  padding: 16px 0;
}
.site-nav {
  display: flex;
  gap: 4px;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 14px;
}
.site-nav a {
  color: var(--fg-2);
  padding: 8px 14px;
  border-radius: 10px;
  transition: all var(--dur-fast) var(--ease-out);
}
.site-nav a:hover { color: var(--fg-1); background: var(--lutra-ink-05); }
.site-nav a.active { color: var(--fg-1); background: var(--lutra-lilac); }
.header-ctas { display: flex; gap: 8px; align-items: center; }
@media (max-width: 860px) {
  .site-nav { display: none; }
}

/* ---------- Footer ---------- */
.site-footer {
  background: var(--lutra-navy);
  color: rgba(255,255,255,0.7);
  padding: 80px 0 36px;
}
.site-footer h5 {
  font-size: 13px;
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 18px;
}
.site-footer a { color: rgba(255,255,255,0.7); display: block; padding: 6px 0; font-size: 14px; }
.site-footer a:hover { color: #fff; }
.footer-grid {
  display: grid;
  grid-template-columns: 1.4fr repeat(4, 1fr);
  gap: 48px;
  padding-bottom: 48px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
@media (max-width: 860px) {
  .footer-grid { grid-template-columns: 1fr 1fr; }
}
.footer-bottom {
  padding-top: 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  gap: 24px;
  flex-wrap: wrap;
}

/* ---------- Utility ---------- */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
@media (max-width: 860px) {
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
}
.stack { display: flex; flex-direction: column; }
.row { display: flex; align-items: center; }

/* ---------- Section heading ---------- */
.section-head {
  max-width: 760px;
  margin: 0 auto 64px;
  text-align: center;
}
.section-head h2 {
  font-size: clamp(34px, 4vw, 52px);
  font-weight: 800;
  letter-spacing: -0.03em;
  line-height: 1.05;
  color: var(--fg-1);
  margin: 14px 0 18px;
}
.section-head p {
  font-size: 19px;
  color: var(--fg-2);
  line-height: 1.55;
  margin: 0;
}
.section-head.left { text-align: left; margin-left: 0; margin-right: 0; }

/* ---------- Animated reveals ---------- */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.reveal { opacity: 0; transform: translateY(12px); transition: opacity 700ms var(--ease-out), transform 700ms var(--ease-out); }
.reveal.in { opacity: 1; transform: none; }

/* ---------- Dotted connector pattern (shared care diagram) ---------- */
.dot-grid {
  background-image: radial-gradient(circle, rgba(102,120,152,0.22) 1px, transparent 1.4px);
  background-size: 22px 22px;
}

/* ---------- Subtle animations ---------- */
@keyframes pulse-dot {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.15); }
}
.pulse-dot { animation: pulse-dot 2.4s var(--ease-out) infinite; }

@keyframes flow-dash {
  to { stroke-dashoffset: -32; }
}
.flow-line { stroke-dasharray: 6 6; animation: flow-dash 1.6s linear infinite; }

/* Mock UI base (used across product mocks) */
.ui-frame {
  background: #fff;
  border: 1px solid var(--border-1);
  border-radius: 20px;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
  font-family: var(--font-body);
}
.ui-frame-bar {
  background: var(--lutra-bone);
  border-bottom: 1px solid var(--border-1);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--fg-3);
}
.ui-dot {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: var(--lutra-ink-20);
}
</style>
</head><body>
<div id="root"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="assets/js/home-shared.js"></script>
<script src="assets/js/home-extra.js"></script>
<script src="assets/js/home.js"></script>
<script>
  var root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(HomePage));
  document.addEventListener('error', function(e){
    var img = e.target;
    if (img && img.tagName === 'IMG'){
      var s = img.getAttribute('src') || '';
      if (s.indexOf('assets/partners/') === 0 || s.indexOf('assets/compliance/') === 0 || s.indexOf('assets/team/') === 0){
        var cell = img.closest('div'); if (cell) cell.style.display = 'none';
      }
    }
  }, true);
</script>
</body></html>
